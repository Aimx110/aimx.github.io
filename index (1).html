<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>临时停靠</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333;
            --accent: #e74c3c;
            --accent2: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 30%, #16213e 60%, #0f3460 100%);
            z-index: -4;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 160px 30px, #ddd, transparent),
                radial-gradient(1px 1px at 200px 60px, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(2px 2px at 250px 20px, #fff, transparent),
                radial-gradient(1px 1px at 300px 75px, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 40px 120px, #eee, transparent),
                radial-gradient(1px 1px at 80px 150px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 170px 140px, #fff, transparent),
                radial-gradient(1px 1px at 220px 110px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 280px 130px, #ddd, transparent),
                radial-gradient(1px 1px at 320px 160px, rgba(255, 255, 255, 0.7), transparent);
            background-size: 360px 200px;
            z-index: -1;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .custom-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -3;
        }

        .custom-bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: -2;
        }

        .container {
            width: 90%;
            max-width: 400px;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .car-icon-wrapper {
            text-align: center;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .car-icon {
            font-size: 64px;
            display: inline-block;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 36px 28px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #e74c3c, #f39c12);
            margin: 0 auto 24px;
            border-radius: 2px;
        }

        .call-btn-wrapper {
            margin: 20px 0 10px;
        }

        .call-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 280px;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.4);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .call-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent);
            border-radius: 50px;
        }

        .call-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
        }

        .call-btn .phone-icon {
            font-size: 22px;
            animation: ring 1.5s ease-in-out infinite;
        }

        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            10% { transform: rotate(15deg); }
            20% { transform: rotate(-15deg); }
            30% { transform: rotate(10deg); }
            40% { transform: rotate(-10deg); }
            50% { transform: rotate(5deg); }
            60% { transform: rotate(-5deg); }
            70% { transform: rotate(0); }
        }

        .hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 16px;
            letter-spacing: 1px;
        }

        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .music-toggle:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        .music-toggle.playing {
            animation: musicPulse 2s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
        }

        .music-notes {
            position: fixed;
            top: 20px;
            right: 70px;
            z-index: 99;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .music-notes.show { opacity: 1; }

        .note {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            animation: noteFloat 2s ease-in-out infinite;
        }

        .note:nth-child(1) { animation-delay: 0s; }
        .note:nth-child(2) { animation-delay: 0.7s; }
        .note:nth-child(3) { animation-delay: 1.4s; }

        @keyframes noteFloat {
            0% { opacity: 0; transform: translateY(0) rotate(0deg); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-30px) rotate(20deg); }
        }

        .overlay-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 15px;
            letter-spacing: 1px;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .overlay-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        @media (max-width: 360px) {
            .card { padding: 28px 20px; }
            .title { font-size: 22px; }
            .call-btn { font-size: 16px; padding: 14px 28px; }
            .car-icon { font-size: 52px; }
        }
    </style>
</head>
<body>
    <div class="custom-bg" id="customBg"></div>
    <div class="custom-bg-overlay" id="customBgOverlay"></div>

    <button class="music-toggle playing" id="musicToggle" title="音乐开关">🎵</button>

    <div class="music-notes show" id="musicNotes">
        <span class="note">♪</span>
        <span class="note" style="margin-left:12px;">♫</span>
        <span class="note" style="margin-left:24px;">♪</span>
    </div>

    <div class="overlay-toast" id="toast"></div>

    <div class="container">
        <div class="car-icon-wrapper">
            <span class="car-icon">🚗</span>
        </div>
        <div class="card">
            <h1 class="title">临时停靠，请多关照</h1>
            <p class="subtitle">如有不便，敬请谅解</p>
            <div class="divider"></div>
            <div class="call-btn-wrapper">
                <button class="call-btn" id="callBtn" onclick="makeCall()">
                    <span class="phone-icon">📞</span>
                    <span>拨打车主电话</span>
                </button>
            </div>
            <p class="hint">点击按钮即可联系车主</p>
        </div>
    </div>

                    audioCtx.resume();
                }
                return audioCtx;
            }

            function playNote(ctx, freq, startTime, duration, type, gain) {
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, startTime);

                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(gain, startTime + 0.05);
                gainNode.gain.setValueAtTime(gain, startTime + duration * 0.7);
                gainNode.gain.linearRampToValueAtTime(0, startTime + duration);

                osc.connect(gainNode);
                gainNode.connect(ctx.destination);

                osc.start(startTime);
                osc.stop(startTime + duration);
            }

            function playMelody() {
                if (!isPlaying) return;
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                let time = now;

                melody.forEach(({ note, dur }) => {

            function playCustomAudio(url) {
                if (!customAudio) {
                    customAudio = new Audio(url);
                    customAudio.loop = true;
                    customAudio.volume = 0.5;
                }
                customAudio.play().catch(() => {});
            }

            function stopCustomAudio() {
                if (customAudio) {
                    customAudio.pause();
                    customAudio.currentTime = 0;
                }
            }

            function startMusic() {
                if (isPlaying) return;
                isPlaying = true;

                if (musicUrl) {
                    playCustomAudio(musicUrl);
                } else {
                    getAudioContext();
                    playMelody();
                }

                musicToggle.classList.add('playing');
                musicToggle.textContent = '🎵';
                musicNotes.classList.add('show');
            }

            function pauseMusic() {
                if (!isPlaying) return;
                isPlaying = false;
                stopMelody();
                stopCustomAudio();
                musicToggle.classList.remove('playing');
                musicToggle.textContent = '🔇';
                musicNotes.classList.remove('show');
            }

            function toggleMusic() {
                if (isPlaying) pauseMusic(); else startMusic();
            }

            musicToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleMusic();
            });

            function tryAutoPlay() {
                if (musicUrl) {
                    customAudio = new Audio(musicUrl);
                    customAudio.loop = true;
                    customAudio.volume = 0.5;
                    customAudio.play().then(() => {
                        isPlaying = true;
                        musicToggle.classList.add('playing');
                        musicToggle.textContent = '🎵';
                        musicNotes.classList.add('show');
                    }).catch(() => {
                        showToast('轻触页面开启音乐 🎵');
                    });
                } else {
                    try {
                        getAudioContext();
                        if (audioCtx.state === 'running') {
                            isPlaying = true;
                            playMelody();
                            musicToggle.classList.add('playing');
                            musicToggle.textContent = '🎵';
                            musicNotes.classList.add('show');
                        } else {
                            showToast('轻触页面开启音乐 🎵');
                        }
                    } catch (e) {
                        showToast('轻触页面开启音乐 🎵');
                    }
                }
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            }

            document.addEventListener('click', function() {
                if (!isPlaying) startMusic();
            });

            tryAutoPlay();

            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    if (isPlaying) {
                        stopMelody();
                        stopCustomAudio();
                    }
                } else {
                    if (isPlaying) {
                        if (musicUrl) playCustomAudio(musicUrl);
                        else { getAudioContext(); playMelody(); }
                    }
                }
            });

            console.log('🚗 挪车二维码页面已就绪');
            console.log('📞 车主电话:', phone);
            console.log('🎵 音乐:', musicUrl || '内置旋律');
            console.log('🖼️ 背景:', bgUrl || '默认星空');
        })();
    </script>
</body>
</html>
